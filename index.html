<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlipWise Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f13;color:#e8e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh}
.header{padding:14px 18px 10px;border-bottom:1px solid #2a2a38;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:17px;font-weight:700;letter-spacing:-0.3px}
.header h1 span{color:#f59e0b}
.updated{font-size:11px;color:#8888aa}
.tabs{display:flex;gap:4px;padding:10px 18px 0}
.tab{padding:5px 13px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;background:transparent;border:1px solid #2a2a38;color:#8888aa;transition:all .15s}
.tab.active{background:#1a1a24;border-color:#444;color:#e8e8f0}
.content{padding:12px 18px 20px;display:flex;flex-direction:column;gap:12px}
.platforms{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{background:#1a1a24;border:1px solid #2a2a38;border-radius:10px;padding:13px}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.badge-ebay{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.badge-vinted{background:rgba(59,130,246,.15);color:#3b82f6;border:1px solid rgba(59,130,246,.3)}
.listings-row{display:flex;align-items:baseline;gap:4px;margin-bottom:9px;padding-bottom:9px;border-bottom:1px solid #2a2a38}
.lst-count{font-size:21px;font-weight:700}
.lst-label{font-size:11px;color:#8888aa}
.lst-value{margin-left:auto;font-size:12px;font-weight:600;color:#22c55e}
.metric{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.ml{font-size:11px;color:#8888aa}
.mv{font-size:13px;font-weight:600}
.mv.gross{color:#e8e8f0}
.mv.net{color:#22c55e}
.mv.sm{font-size:11px;color:#8888aa;font-weight:400}
.combined-card{background:#1a1a24;border:1px solid #2a2a38;border-radius:10px;padding:13px}
.section-label{font-size:11px;font-weight:600;color:#8888aa;text-transform:uppercase;letter-spacing:.8px;margin-bottom:11px}
.combined-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center}
.cval{font-size:19px;font-weight:700}
.cval.gross{color:#e8e8f0}
.cval.net{color:#22c55e}
.cval.orders{color:#a78bfa}
.clbl{font-size:11px;color:#8888aa;margin-top:2px}
.chart-card{background:#1a1a24;border:1px solid #2a2a38;border-radius:10px;padding:13px}
.chart-wrap{height:155px}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 13px;font-size:12px;color:#fca5a5;margin-top:8px}
.loading{color:#8888aa;font-size:13px;padding:24px;text-align:center}
.fee-card{background:#1a1a24;border:1px solid #2a2a38;border-radius:10px;padding:13px}
.fee-platforms{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fee-platform{background:#13131a;border:1px solid #2a2a38;border-radius:8px;padding:10px}
.fee-platform .platform-name{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.fee-platform .platform-name.ebay{color:#f59e0b}
.fee-platform .platform-name.vinted{color:#3b82f6}
.fee-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.fee-lbl{font-size:11px;color:#8888aa}
.fee-val{font-size:12px;font-weight:500;color:#ef4444}
.fee-total-row{display:flex;justify-content:space-between;align-items:baseline;margin-top:7px;padding-top:7px;border-top:1px solid #2a2a38}
.fee-total-lbl{font-size:11px;font-weight:600;color:#e8e8f0}
.fee-total-val{font-size:13px;font-weight:700;color:#ef4444}
.fee-zero{font-size:12px;font-weight:500;color:#22c55e}
.avg-card{background:#1a1a24;border:1px solid #2a2a38;border-radius:10px;padding:13px}
.avg-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.avg-platform{background:#13131a;border:1px solid #2a2a38;border-radius:8px;padding:10px;text-align:center}
.avg-platform-name{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.avg-platform-name.ebay{color:#f59e0b}
.avg-platform-name.vinted{color:#3b82f6}
.avg-price{font-size:22px;font-weight:700;color:#e8e8f0;margin-bottom:3px}
.avg-sub{font-size:10px;color:#8888aa}
.goal-card{background:#1a1a24;border:1px solid #2a2a38;border-radius:10px;padding:13px}
.goal-item{margin-bottom:12px}
.goal-item:last-child{margin-bottom:0}
.goal-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.goal-month{font-size:12px;font-weight:600;color:#e8e8f0}
.goal-amounts{font-size:11px;color:#8888aa}
.goal-bar-bg{background:#2a2a38;border-radius:6px;height:8px;overflow:hidden}
.goal-bar-fill{height:100%;border-radius:6px;transition:width .4s ease}
.goal-bar-fill.current{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.goal-bar-fill.future{background:#2a2a38}
.goal-status{display:flex;justify-content:space-between;margin-top:5px}
.goal-pct{font-size:11px;font-weight:600}
.goal-pct.on-track{color:#22c55e}
.goal-pct.behind{color:#f59e0b}
.goal-pct.future-txt{color:#8888aa}
.goal-remaining{font-size:10px;color:#8888aa}
.str-card{background:#1a1a24;border:1px solid #2a2a38;border-radius:10px;padding:13px}
.str-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.str-platform{background:#13131a;border:1px solid #2a2a38;border-radius:8px;padding:10px}
.str-platform-name{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.str-platform-name.ebay{color:#f59e0b}
.str-platform-name.vinted{color:#3b82f6}
.str-pct{font-size:22px;font-weight:700;color:#e8e8f0;margin-bottom:4px}
.str-bar-bg{background:#2a2a38;border-radius:4px;height:5px;overflow:hidden;margin-bottom:5px}
.str-bar-fill{height:100%;border-radius:4px}
.str-bar-fill.ebay{background:#f59e0b}
.str-bar-fill.vinted{background:#3b82f6}
.str-detail{font-size:10px;color:#8888aa}
</style>
</head>
<body>

<div class="header">
  <h1>Flip<span>Wise</span></h1>
  <div class="updated" id="ts">Loading…</div>
</div>

<div class="tabs">
  <button class="tab active" data-p="30d">30 Days</button>
  <button class="tab" data-p="90d">90 Days</button>
  <button class="tab" data-p="all_time">All Time</button>
</div>

<div class="content">
  <div id="root"><div class="loading">Loading dashboard…</div></div>
</div>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/joshcearbaugh/flipwise-dashboard/main/data/dashboard_data.json';

let data = null, period = '30d', chart = null;

const $ = id => document.getElementById(id);
const fmt = n => '$' + Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
const fmtPct = n => n.toFixed(1) + '%';
const clamp = (v,lo,hi) => Math.min(Math.max(v,lo),hi);

async function load() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    data = await res.json();
    render();
  } catch(e) {
    $('root').innerHTML = '<div class="err">⚠ Failed to load: ' + e.message + '</div>';
  }
}

function sumMonth(dailyArr, ym) {
  return (dailyArr || []).filter(d => d.date && d.date.startsWith(ym))
    .reduce((s, d) => s + (d.gross || 0), 0);
}

function render() {
  if (!data) return;
  const er = data.ebay.revenue[period]   || data.ebay.revenue['30d'];
  const vr = data.vinted.revenue[period] || data.vinted.revenue['30d'];
  const cr = data.combined_revenue[period] || data.combined_revenue['30d'];
  const el = data.ebay.listings;
  const vl = data.vinted.listings;

  $('ts').textContent = 'Updated ' + new Date(data.generated_at).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});

  const e30 = data.ebay.revenue['30d'];
  const ebayFees    = e30.ebay_fees      || 0;
  const ebayShip    = e30.shipping_labels || 0;
  const ebayShipChg = e30.shipping_charged || 0;
  const ebayTotalFees = ebayFees + ebayShip;

  const ebayAvg   = er.order_count > 0 ? er.gross / er.order_count : 0;
  const vintedAvg = vr.order_count > 0 ? vr.gross / vr.order_count : 0;

  const eStr = el.count > 0 ? (er.items_sold || er.order_count) / el.count * 100 : 0;
  const vStr = vl.count > 0 ? (vr.order_count) / vl.count * 100 : 0;

  const now = new Date();
  const thisYM = now.toISOString().slice(0,7);
  const nextYM = (() => { const d=new Date(now); d.setMonth(d.getMonth()+1); return d.toISOString().slice(0,7); })();
  const goals = data.goals || {};

  const ebayMTD   = sumMonth(data.ebay.daily_sales,   thisYM);
  const vintedMTD = sumMonth(data.vinted.daily_sales, thisYM);
  const totalMTD  = ebayMTD + vintedMTD;

  function goalHTML(ym, mtdRevenue) {
    if (!goals[ym]) return '';
    const g = goals[ym];
    const target = g.monthly_revenue;
    const isCurrentMonth = ym === thisYM;
    const isFuture = ym > thisYM;
    const current = isCurrentMonth ? mtdRevenue : (isFuture ? 0 : target);
    const pct = clamp(current / target * 100, 0, 100);
    const remaining = Math.max(target - current, 0);
    const daysInMonth = new Date(parseInt(ym.slice(0,4)), parseInt(ym.slice(5,7)), 0).getDate();
    const dayOfMonth = isCurrentMonth ? now.getDate() : (isFuture ? 0 : daysInMonth);
    const projectedRevenue = isCurrentMonth && dayOfMonth > 0 ? current / dayOfMonth * daysInMonth : 0;
    const isOnTrack = projectedRevenue >= target;
    const pctClass = isFuture ? 'future-txt' : (isOnTrack ? 'on-track' : 'behind');
    const pctLabel = isFuture ? 'Upcoming' : (pct >= 100 ? '✓ Goal hit!' : (isOnTrack ? 'On track' : 'Behind pace'));
    const remainLabel = isFuture ? `Goal: ${fmt(target)}` : (pct >= 100 ? '' : `${fmt(remaining)} to go`);
    return `
      <div class="goal-item">
        <div class="goal-header">
          <span class="goal-month">${g.label} ${ym.slice(0,4)}</span>
          <span class="goal-amounts">${isCurrentMonth ? fmt(current)+' / ' : ''}${fmt(target)}</span>
        </div>
        <div class="goal-bar-bg">
          <div class="goal-bar-fill ${isFuture ? 'future' : 'current'}" style="width:${pct}%"></div>
        </div>
        <div class="goal-status">
          <span class="goal-pct ${pctClass}">${pctLabel}</span>
          <span class="goal-remaining">${remainLabel}</span>
        </div>
      </div>`;
  }

  $('root').innerHTML = `
    <div class="platforms">
      <div class="card">
        <div class="badge badge-ebay">eBay</div>
        <div class="listings-row">
          <span class="lst-count">${el.count}</span>
          <span class="lst-label">active</span>
          <span class="lst-value">${fmt(el.total_value)}</span>
        </div>
        <div class="metric"><span class="ml">Gross</span><span class="mv gross">${fmt(er.gross)}</span></div>
        <div class="metric"><span class="ml">Net</span><span class="mv net">${fmt(er.net)}</span></div>
        <div class="metric"><span class="ml">Orders</span><span class="mv sm">${er.order_count}</span></div>
        <div class="metric"><span class="ml">Items sold</span><span class="mv sm">${er.items_sold ?? '—'}</span></div>
        <div class="metric"><span class="ml">Avg net/sale</span><span class="mv net" style="font-size:11px">${er.order_count > 0 ? fmt(er.net / er.order_count) : '—'}</span></div>
      </div>
      <div class="card">
        <div class="badge badge-vinted">Vinted</div>
        <div class="listings-row">
          <span class="lst-count">${vl.count}</span>
          <span class="lst-label">active</span>
          <span class="lst-value">${fmt(vl.total_value)}</span>
        </div>
        <div class="metric"><span class="ml">Gross</span><span class="mv gross">${fmt(vr.gross)}</span></div>
        <div class="metric"><span class="ml">Net</span><span class="mv net">${fmt(vr.net)}</span></div>
        <div class="metric"><span class="ml">Orders</span><span class="mv sm">${vr.order_count}</span></div>
        <div class="metric"><span class="ml">Avg net/sale</span><span class="mv net" style="font-size:11px">${vr.order_count > 0 ? fmt(vr.net / vr.order_count) : '—'}</span></div>
      </div>
    </div>

    <div class="combined-card">
      <div class="section-label">Combined · ${period==='30d'?'30 Days':period==='90d'?'90 Days':'All Time'}</div>
      <div class="combined-grid">
        <div><div class="cval gross">${fmt(cr.gross)}</div><div class="clbl">Gross</div></div>
        <div><div class="cval net">${fmt(cr.net)}</div><div class="clbl">Net</div></div>
        <div><div class="cval orders">${cr.order_count}</div><div class="clbl">Orders</div></div>
      </div>
    </div>

    <div class="goal-card">
      <div class="section-label">Monthly Goals</div>
      ${goalHTML(thisYM, totalMTD)}
      ${goalHTML(nextYM, 0)}
    </div>

    <div class="fee-card">
      <div class="section-label">Fee Breakdown · 30 Days</div>
      <div class="fee-platforms">
        <div class="fee-platform">
          <div class="platform-name ebay">eBay</div>
          <div class="fee-row"><span class="fee-lbl">Selling fees</span><span class="fee-val">${fmt(ebayFees)}</span></div>
          <div class="fee-row"><span class="fee-lbl">Ship labels</span><span class="fee-val">${fmt(ebayShip)}</span></div>
          <div class="fee-row"><span class="fee-lbl">Ship charged</span><span class="fee-val" style="color:#22c55e">+${fmt(ebayShipChg)}</span></div>
          <div class="fee-total-row">
            <span class="fee-total-lbl">Net fees out</span>
            <span class="fee-total-val">${fmt(Math.max(ebayTotalFees - ebayShipChg, 0))}</span>
          </div>
        </div>
        <div class="fee-platform">
          <div class="platform-name vinted">Vinted</div>
          <div class="fee-row"><span class="fee-lbl">Selling fees</span><span class="fee-zero">$0.00</span></div>
          <div class="fee-row"><span class="fee-lbl">Buyer pays ship</span><span class="fee-zero">✓</span></div>
          <div class="fee-total-row">
            <span class="fee-total-lbl">Net fees out</span>
            <span class="fee-zero" style="font-size:13px;font-weight:700">$0.00</span>
          </div>
        </div>
      </div>
    </div>

    <div class="avg-card">
      <div class="section-label">Avg Sale Price · ${period==='30d'?'30 Days':period==='90d'?'90 Days':'All Time'}</div>
      <div class="avg-grid">
        <div class="avg-platform">
          <div class="avg-platform-name ebay">eBay</div>
          <div class="avg-price">${fmt(ebayAvg)}</div>
          <div class="avg-sub">${er.order_count} orders</div>
        </div>
        <div class="avg-platform">
          <div class="avg-platform-name vinted">Vinted</div>
          <div class="avg-price">${fmt(vintedAvg)}</div>
          <div class="avg-sub">${vr.order_count} orders</div>
        </div>
      </div>
    </div>

    <div class="str-card">
      <div class="section-label">Sell-Through Rate · 30 Days</div>
      <div class="str-grid">
        <div class="str-platform">
          <div class="str-platform-name ebay">eBay</div>
          <div class="str-pct">${fmtPct(eStr)}</div>
          <div class="str-bar-bg"><div class="str-bar-fill ebay" style="width:${clamp(eStr,0,100)}%"></div></div>
          <div class="str-detail">${er.items_sold || er.order_count} sold / ${el.count} listed</div>
        </div>
        <div class="str-platform">
          <div class="str-platform-name vinted">Vinted</div>
          <div class="str-pct">${fmtPct(vStr)}</div>
          <div class="str-bar-bg"><div class="str-bar-fill vinted" style="width:${clamp(vStr,0,100)}%"></div></div>
          <div class="str-detail">${vr.order_count} sold / ${vl.count} listed</div>
        </div>
      </div>
    </div>

    <div class="chart-card">
      <div class="section-label">Daily Sales — Last 31 Days</div>
      <div class="chart-wrap"><canvas id="ch"></canvas></div>
    </div>
  `;

  buildChart();
}

function buildChart() {
  if (!data) return;
  const daily = data.combined_daily || [];
  const labels = daily.map(d => {
    const dt = new Date(d.date + 'T12:00:00Z');
    return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  });

  if (chart) { chart.destroy(); chart = null; }
  const ctx = $('ch');
  if (!ctx) return;

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label:'eBay',   data: daily.map(d => +(d.ebay_gross||0).toFixed(2)),   backgroundColor:'rgba(245,158,11,.85)', stack:'s', borderRadius:2, borderSkipped:false },
        { label:'Vinted', data: daily.map(d => +(d.vinted_gross||0).toFixed(2)), backgroundColor:'rgba(59,130,246,.85)',  stack:'s', borderRadius:2, borderSkipped:false }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins: {
        legend:{ labels:{ color:'#8888aa', font:{size:11}, boxWidth:10, padding:12 } },
        tooltip:{ backgroundColor:'#1a1a24', borderColor:'#2a2a38', borderWidth:1, titleColor:'#e8e8f0', bodyColor:'#8888aa',
          callbacks:{ label: c => ' '+c.dataset.label+': $'+c.parsed.y.toFixed(2) } }
      },
      scales:{
        x:{ stacked:true, grid:{color:'rgba(255,255,255,.04)'}, ticks:{color:'#8888aa',font:{size:9},maxRotation:45,maxTicksLimit:12} },
        y:{ stacked:true, grid:{color:'rgba(255,255,255,.06)'}, ticks:{color:'#8888aa',font:{size:10},callback:v=>'$'+v} }
      }
    }
  });
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    period = t.dataset.p;
    render();
  });
});

load();
</script>
</body>
</html>
